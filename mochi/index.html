<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Mochi ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:85vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at bottom,#0d1b2a,#000);
color:white;
font-family:'Quicksand',sans-serif;
overflow:hidden;
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:.8;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

/* card */

.card{
max-width:650px;
background:rgba(0,0,0,.45);
padding:40px;
border-radius:25px;
backdrop-filter:blur(10px);
text-align:center;
box-shadow:0 0 60px rgba(255,150,200,.3);
}

/* title */

.title{
font-family:'Pacifico',cursive;
font-size:36px;
color:#ffb3c6;
margin-bottom:20px;
}

/* typing text */

#text{
font-size:19px;
line-height:1.8;
min-height:260px;
}

/* ending */

#ending{
font-family:'Pacifico';
font-size:48px;
opacity:0;
margin-top:30px;
color:#ff8fab;
text-shadow:0 0 25px pink;
transition:2s;
}

/* hearts */

.heart{
position:absolute;
font-size:20px;
color:#ff8fab;
pointer-events:none;
animation:pop 1s ease forwards;
}

@keyframes pop{
0%{transform:scale(0) translateY(0);opacity:1}
100%{transform:scale(1.6) translateY(-120px);opacity:0}
}

iframe{
display:none;
}

</style>
</head>

<body>

<div class="card">

<div class="title">Dear Mochi Sayang ❤️</div>

<div id="text"></div>

<div id="ending">I Love You Mochi ❤️</div>

</div>

<!-- YouTube music -->
<iframe id="music"
src="https://www.youtube.com/embed/nSDgHBxUbVQ?enablejsapi=1&loop=1&playlist=nSDgHBxUbVQ">
</iframe>

<script>

/* stars */

for(let i=0;i<120;i++){
let star=document.createElement("div")
star.className="star"
star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"
document.body.appendChild(star)
}

/* message */

const message=`I see you, every quiet effort, every late night, every time you carry so much with such grace.

I see how deeply responsible you are, how strong your heart is, how you make everything around you feel safer and warmer just by being you.

Your smile at the end of the day, your gentle way of caring for people, even the small things you think no one notices...

I notice.

And I cherish every single one of them.

You're not just loved.

You're endlessly admired.

Endlessly adored.

Endlessly my favorite person in the whole world.

I love you more than words can ever carry.

Today, tomorrow, and every single day after that.

Forever yours...

Your biggest fan & your home.`

const words=message.split(" ")
let i=0

function typeWord(){

if(i<words.length){

document.getElementById("text").innerHTML+=words[i]+" "
i++

setTimeout(typeWord,180)

}else{

document.getElementById("ending").style.opacity=1

}

}

typeWord()

/* hearts + start music */

document.addEventListener("click",e=>{

let player=document.getElementById("music")
player.src+="&autoplay=1"

for(let i=0;i<15;i++){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"

heart.style.left=(e.clientX+Math.random()*50-25)+"px"
heart.style.top=(e.clientY+Math.random()*50-25)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),1000)

}

},{once:true})

</script>

</body>
</html>
