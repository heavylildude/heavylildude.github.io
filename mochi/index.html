<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mochi ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at bottom,#0d1b2a,#000814);
color:white;
font-family:'Quicksand',sans-serif;
overflow:hidden;
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:.8;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

/* card */

.card{
max-width:650px;
background:rgba(0,0,0,.45);
padding:40px;
border-radius:25px;
backdrop-filter:blur(10px);
text-align:center;
box-shadow:0 0 60px rgba(255,150,200,.3);
}

/* title */

.title{
font-family:'Pacifico',cursive;
font-size:34px;
color:#ffb3c6;
margin-bottom:20px;
}

/* typing text */

#text{
font-size:20px;
line-height:1.8;
min-height:200px;
}

/* ending */

#ending{
font-family:'Pacifico';
font-size:46px;
opacity:0;
margin-top:30px;
color:#ff8fab;
text-shadow:0 0 25px pink;
transition:2s;
}

/* hearts */

.heart{
position:absolute;
font-size:22px;
color:#ff8fab;
pointer-events:none;
animation:pop 1s ease forwards;
}

@keyframes pop{
0%{transform:scale(0) translateY(0);opacity:1}
100%{transform:scale(1.6) translateY(-120px);opacity:0}
}

iframe{
display:none;
}

</style>
</head>

<body>

<div class="card">

<div class="title">Untuk Mochi ❤️</div>

<div id="text"></div>

<div id="ending">Aku Sayang Kamu ❤️</div>

</div>

<!-- YouTube music -->
<iframe id="music"
src="https://www.youtube.com/embed/nSDgHBxUbVQ?enablejsapi=1&loop=1&playlist=nSDgHBxUbVQ">
</iframe>

<script>

const message=`Mochi sayang...
<br>
Aku tau kamu capek.
Aku tau kadang hari-harimu terasa berat.
<br>
Mungkin banyak hal yang harus kamu pikirkan,
banyak tanggung jawab yang kamu bawa,
dan kadang rasanya dunia berjalan terlalu cepat.
<br>
Tapi aku ingin kamu tahu satu hal.
<br>
I'm always with you
Aku melihat semua usaha kecilmu.
Aku melihat seberapa kuat hatimu.
<br>
Dan aku sangat bangga sama kamu.
<br>
Kalau suatu hari kamu merasa lelah,
atau merasa semuanya terlalu berat...
<br>
Ingat kita,
kamu tidak sendirian.
<br>
Aku selalu ada di sini.
<br>
Aku akan selalu sayang kamu,
selalu dukung kamu,
dan selalu berdiri di samping kamu.
<br>
Aku tidak akan pernah pergi.
<br>
Aku tidak akan pernah melepaskan kamu.`


const container = document.getElementById("text")

const lines = message.split("<br>")

let lineIndex = 0
let wordIndex = 0

function typeLine(){

if(lineIndex >= lines.length) return

const words = lines[lineIndex].trim().split(" ")

let lineDiv = document.createElement("div")
lineDiv.style.marginBottom="14px"
container.appendChild(lineDiv)

function typeWord(){

if(wordIndex < words.length){

lineDiv.innerHTML += words[wordIndex] + " "
wordIndex++

setTimeout(typeWord,160)

}else{

lineIndex++
wordIndex=0

setTimeout(typeLine,600)

}

}

typeWord()

}

typeLine()

</script>

</body>
</html>
